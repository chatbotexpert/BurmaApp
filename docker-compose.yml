version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=burmanews
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    restart: unless-stopped

  web:
    build: .
    # Run DB migrations and collect static files before starting the web server
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn burma_news.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-production-key-change-this
      - DATABASE_URL=postgres://postgres:postgres@db:5432/burmanews
      - ALLOWED_HOSTS=*
      - FACEBOOK_COOKIE_STRING=datr=2cTZaDqpupLhM3AYof52QilB; sb=2cTZaCbVSFbASx4POJljL6qC; c_user=100077494490498; wd=1912x954; xs=33%3AKt-7ivngl_iCGg%3A2%3A1763926123%3A-1%3A-1%3A%3AAcw6kHoeerTnHQGH4CQTb3Iq81h0w73QpKktMo6yKw; presence=C%7B%22t3%22%3A%5B%5D%2C%22utc3%22%3A1764065363638%2C%22v%22%3A1%7D; fr=0ZSbJnQEqCPbix7JU.AWfn7Xmw17THLcZ1HwNQ192ZYKqr7HzX7rGAFHIe0fAi2-a-Wrk.BpI2Bq..AAA.0.0.BpKgNJ.AWcf3sSLO7QfdNpCZZsiXh4hMkk
    depends_on:
      - db
    restart: unless-stopped

  scraper:
    build: .
    # This overrides the CMD in the Dockerfile to run the scraper script instead
    command: python manage.py run_scheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-production-key-change-this
      - DATABASE_URL=postgres://postgres:postgres@db:5432/burmanews
      - ALLOWED_HOSTS=*
      - FACEBOOK_COOKIE_STRING=datr=2cTZaDqpupLhM3AYof52QilB; sb=2cTZaCbVSFbASx4POJljL6qC; c_user=100077494490498; wd=1912x954; xs=33%3AKt-7ivngl_iCGg%3A2%3A1763926123%3A-1%3A-1%3A%3AAcw6kHoeerTnHQGH4CQTb3Iq81h0w73QpKktMo6yKw; presence=C%7B%22t3%22%3A%5B%5D%2C%22utc3%22%3A1764065363638%2C%22v%22%3A1%7D; fr=0ZSbJnQEqCPbix7JU.AWfn7Xmw17THLcZ1HwNQ192ZYKqr7HzX7rGAFHIe0fAi2-a-Wrk.BpI2Bq..AAA.0.0.BpKgNJ.AWcf3sSLO7QfdNpCZZsiXh4hMkk
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
