version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=burmanews
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    restart: unless-stopped

  web:
    build: .
    # Run DB migrations and collect static files before starting the web server
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn burma_news.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-production-key-change-this
      - DATABASE_URL=postgres://postgres:postgres@db:5432/burmanews
      - ALLOWED_HOSTS=*
      - FACEBOOK_COOKIE_STRING=sb=fJWlaQOAU4JaaHRtVGzPc2Vr; datr=fJWladQM7IAIROs1QQYEKq5N; c_user=623430184; xs=24%3ATzkrXLxc78lXmA%3A2%3A1772460055%3A-1%3A-1%3A-1%3AAacy78z; presence=C%7B%22t%22%3A%22o%22%2C%22i%22%3A%22sc.141; wd=1424x444; fr=1rcJffqTPwN4LLtjv.AWee-5qCgiqUkZJqKdcosPYFGlZnRajbZiBYDD2NAlvd; locale=en_GB
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - db
    restart: unless-stopped

  scraper:
    build: .
    # This overrides the CMD in the Dockerfile to run the scraper script instead
    command: python manage.py run_scheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-production-key-change-this
      - DATABASE_URL=postgres://postgres:postgres@db:5432/burmanews
      - ALLOWED_HOSTS=*
      - FACEBOOK_COOKIE_STRING=sb=fJWlaQOAU4JaaHRtVGzPc2Vr; datr=fJWladQM7IAIROs1QQYEKq5N; c_user=623430184; xs=24%3ATzkrXLxc78lXmA%3A2%3A1772460055%3A-1%3A-1%3A-1%3AAacy78z; presence=C%7B%22t%22%3A%22o%22%2C%22i%22%3A%22sc.141; wd=1424x444; fr=1rcJffqTPwN4LLtjv.AWee-5qCgiqUkZJqKdcosPYFGlZnRajbZiBYDD2NAlvd; locale=en_GB
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
